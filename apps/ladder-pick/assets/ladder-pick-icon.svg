<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Ladder rails -->
  <rect x="17" y="5" width="6" height="54" rx="3" fill="#2d3748"/>
  <rect x="41" y="5" width="6" height="54" rx="3" fill="#2d3748"/>
  <!-- Rungs -->
  <rect x="21" y="12" width="22" height="3.5" rx="1" fill="#2d3748"/>
  <rect x="21" y="21" width="22" height="3.5" rx="1" fill="#2d3748"/>
  <rect x="21" y="30" width="22" height="3.5" rx="1" fill="#2d3748"/>
  <rect x="21" y="39" width="22" height="3.5" rx="1" fill="#2d3748"/>
  <rect x="21" y="48" width="22" height="3.5" rx="1" fill="#2d3748"/>

  <!-- Red path: top-left to mid-right, crossing at rung 3 -->
  <polyline points="5,14 20,14 20,23 44,32 44,40 59,40"
            fill="none" stroke="#e53e3e" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Blue path: top-right to mid-left, crossing at rung 2-3 -->
  <polyline points="59,14 44,14 44,23 20,40 20,49 5,49"
            fill="none" stroke="#3b82f6" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Green path: mid-left to bottom-right, crossing at rung 4 -->
  <polyline points="5,32 20,32 20,40 44,49 44,55 59,55"
            fill="none" stroke="#22c55e" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Endpoint dots -->
  <circle cx="5"  cy="14" r="3.5" fill="#e53e3e"/>
  <circle cx="59" cy="40" r="3.5" fill="#e53e3e"/>
  <circle cx="59" cy="14" r="3.5" fill="#3b82f6"/>
  <circle cx="5"  cy="49" r="3.5" fill="#3b82f6"/>
  <circle cx="5"  cy="32" r="3.5" fill="#22c55e"/>
  <circle cx="59" cy="55" r="3.5" fill="#22c55e"/>
</svg>
